name: Update Repository Index

on:
  workflow_run:
    workflows:
      - APK Package ID & Discoverium Generator
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SEO index
        run: |
          mkdir -p docs

          REPO_URL="https://github.com/${{ github.repository }}"

          INDEX_FILE="docs/README.md"

          cat > "$INDEX_FILE" << 'EOF'
          # Android APK Metadata & Discoverium Config Index

          Browse tracked Android APK repositories with:

          - APK package IDs
          - Discoverium / Obtainium import configs
          - SHA256 hashes
          - Play Store links
          - APK metadata
          - GitHub release APK tracking

          This repository automatically scans GitHub APK release repositories and generates searchable Android app metadata indexes.

          ## Available APK Repositories

          EOF

          find docs -maxdepth 1 -name "*.md" ! -name "README.md" | sort | while read file; do

            filename=$(basename "$file")

            repo_name="${filename%.md}"

            pretty_name=$(echo "$repo_name" | sed 's/__/\//g')

            echo "- [${pretty_name}](${REPO_URL}/blob/main/docs/${filename})" >> "$INDEX_FILE"

          done

          echo "" >> "$INDEX_FILE"

          echo "---" >> "$INDEX_FILE"

          echo "" >> "$INDEX_FILE"

          echo "_Automatically generated by GitHub Actions._" >> "$INDEX_FILE"
      - name: Commit and push
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f docs/README.md

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update repository index"

          git push